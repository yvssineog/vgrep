[workspace]
name = "vgrep-core"
description = "Mojo sidecar for vgrep — file walking, merkle hashing, semantic chunking, embedding, vector kNN"
authors = ["vgrep"]
# Stable Mojo / MAX channel (beta v1 line). Switch to
# https://conda.modular.com/max-nightly/ for nightly builds.
channels = ["https://conda.modular.com/max/", "conda-forge"]
# Modular only ships osx-arm64 (Apple Silicon) + linux-64 + linux-aarch64;
# Intel Mac (osx-64) is unsupported.
platforms = ["osx-arm64", "linux-64", "linux-aarch64"]
version = "0.1.0"

[tasks]
# Long-lived sidecar entrypoint; `bun` spawns one of these per project.
run     = "mojo run src/main.mojo"
build   = "mojo build src/main.mojo -o dist/vgrep-core"
test    = "mojo run tests/run.mojo"
fmt     = "mojo format src/"

[dependencies]
# `modular` ships the full toolchain: `mojo` (compiler) + `max` (runtime CLI
# for `max serve` / `max encode`). The MAX engine is what we use for
# embedding inference — no torch, no sentence-transformers in the sidecar.
modular = "*"
python = ">=3.11,<3.13"

[pypi-dependencies]
# Tree-sitter parsing: per-language grammars + the runtime. The embedding
# pipeline runs out-of-process via `max serve`, so its deps don't leak
# into the sidecar's import graph.
"tree-sitter" = ">=0.23"
"tree-sitter-language-pack" = ">=0.7"
